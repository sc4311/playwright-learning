<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Task</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a href="/" id="nav-home">Home</a>
    <a href="/tasks" id="nav-tasks">Tasks</a>
    <a href="/tasks/new" id="nav-new">New Task</a>
</nav>

<main>
    <h1 id="page-title">New Task</h1>

    <form th:action="@{/tasks}" method="post" th:object="${task}" id="task-form">
        <div class="form-group">
            <label for="title">Title *</label>
            <input type="text" id="title" th:field="*{title}"
                   placeholder="Enter task title" autocomplete="off">
            <span class="error" th:if="${#fields.hasErrors('title')}"
                  th:errors="*{title}" id="title-error"></span>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}"
                      placeholder="Optional description" rows="3"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn" id="submit-btn">Create Task</button>
            <a href="/tasks" class="btn btn-secondary" id="cancel-btn">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
