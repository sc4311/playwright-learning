<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <a href="/" id="nav-home">Home</a>
    <a href="/tasks" id="nav-tasks">Tasks</a>
    <a href="/tasks/new" id="nav-new">New Task</a>
</nav>

<main>
    <h1 id="page-title">All Tasks</h1>

    <div class="filters" id="filter-bar">
        <a th:href="@{/tasks}" id="filter-all"
           th:classappend="${filter == 'all'} ? 'active' : ''">All</a>
        <a th:href="@{/tasks(filter='pending')}" id="filter-pending"
           th:classappend="${filter == 'pending'} ? 'active' : ''">Pending</a>
        <a th:href="@{/tasks(filter='completed')}" id="filter-completed"
           th:classappend="${filter == 'completed'} ? 'active' : ''">Completed</a>
    </div>

    <div th:if="${tasks.isEmpty()}" id="empty-message">
        <p>No tasks found. <a href="/tasks/new">Create one!</a></p>
    </div>

    <ul class="task-list" id="task-list" th:unless="${tasks.isEmpty()}">
        <li th:each="task : ${tasks}"
            th:class="${task.completed} ? 'task-item completed' : 'task-item'"
            th:id="'task-' + ${task.id}">
            <div class="task-info">
                <a th:href="@{/tasks/{id}(id=${task.id})}"
                   th:text="${task.title}"
                   class="task-title"></a>
                <span th:if="${task.description}" th:text="${task.description}"
                      class="task-desc"></span>
            </div>
            <div class="task-actions">
                <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post">
                    <button type="submit" class="btn-small btn-toggle"
                            th:text="${task.completed} ? 'Undo' : 'Done'"></button>
                </form>
                <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post">
                    <button type="submit" class="btn-small btn-delete">Delete</button>
                </form>
            </div>
        </li>
    </ul>

    <a href="/tasks/new" class="btn" id="add-task-btn">+ Add Task</a>
</main>
</body>
</html>
